services:
  - type: web
    name: playmcp-privacy-guard
    env: node
    region: singapore
    plan: free
    buildCommand: pnpm install && pnpm build
    startCommand: node dist/index.js
    envVars:
      - key: PORT
        value: 10000
      - key: HOST
        value: 0.0.0.0
      - key: NODE_ENV
        value: production
    healthCheckPath: /health
